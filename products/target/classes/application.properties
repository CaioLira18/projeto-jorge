server.port=${SERVER_PORT:5002}
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-para-jwt-2024}

# Arquivos de dados por instância — cada réplica usa o próprio arquivo
data.file=./data/products-${server.port}.json

# URL da réplica par (réplica primária aponta para a secundária e vice-versa)
replica.url=${REPLICA_URL:http://localhost:5012}
replica.enabled=${REPLICA_ENABLED:true}
